  <stop offset="0%" stop-color="#4DA3FF"/>
  <stop offset="100%" stop-color="#8A4DFF"/>
</linearGradient>
  <g stroke="black" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- Feed lines -->
